apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: opencode-template
  namespace: opencode
spec:
  podTemplate:
    spec:
      containers:
        - name: sandbox
          image: poc-sandbox:latest
          imagePullPolicy: Never   # loaded into kind via `kind load docker-image`
          ports:
            - containerPort: 4096
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-keys
                  key: anthropic
            # Tell opencode how to find the API key via its config system
            - name: OPENCODE_CONFIG_CONTENT
              value: |
                {"provider":{"anthropic":{"options":{"apiKey":"{env:ANTHROPIC_API_KEY}"}}}}
          readinessProbe:
            httpGet:
              path: /doc      # opencode's OpenAPI spec endpoint — always returns 200
              port: 4096
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
